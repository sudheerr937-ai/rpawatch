version: "3.8"

services:
  collector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rpawatch-collector
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - UIPATH_MODE=pat
    volumes:
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  webhook:
    build:
      context: ./webhook
      dockerfile: Dockerfile
    container_name: rpawatch-webhook
    restart: unless-stopped
    env_file:
      - ./webhook/.env
    ports:
      - "3000:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
